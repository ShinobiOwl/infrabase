<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InfraBase{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .card-header { background: transparent; border-bottom: 1px solid #334155; color: #94a3b8; font-weight: 600; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .st-Healthy { color: #4ade80; }
        .st-Degraded { color: #facc15; }
        .st-Down { color: #f87171; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background: #1e293b; border-bottom: 1px solid #334155;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fas fa-server me-2 text-primary"></i>InfraBase</a>
            <span class="text-secondary">Internal Developer Portal</span>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
